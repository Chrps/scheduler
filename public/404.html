<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GitHub Pages SPA Redirect</title>
    <script>
      // Keep this as 1 for GitHub project pages (https://<user>.github.io/<repo>/).
      // Set to 0 for user/organization pages (https://<user>.github.io/).
      const pathSegmentsToKeep = 1;

      const l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
